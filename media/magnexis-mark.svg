<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver" x1="40" y1="30" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#F2F2F2"/>
      <stop offset="70%" stop-color="#D9D9D9"/>
      <stop offset="100%" stop-color="#BEBEBE"/>
    </linearGradient>

    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect
    x="8"
    y="8"
    width="240"
    height="240"
    rx="48"
    fill="#050505"
  />

  <!-- Main M -->
  <g filter="url(#shadow)">
    <path
      d="
      M64 188
      V76

      L128 140

      L192 76
      V188
      "
      stroke="url(#silver)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Floating center notch -->
    <path
      d="
      M98 92
      L128 122
      L158 92
      "
      stroke="url(#silver)"
      stroke-width="12"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Bottom dot -->
    <circle
      cx="128"
      cy="186"
      r="10"
      fill="url(#silver)"
    />
  </g>
</svg>